<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discgolf Stats – Kristjan Liiv</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #60a5fa;
      --accent: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 16px 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    header { margin-bottom: 28px; }
    h1 { font-size: 1.6rem; color: var(--accent); letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      width: 300px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }
    input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      width: 80px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="number"]:focus { border-color: var(--accent); }
    button#loadBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 24px;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button#loadBtn:hover:not(:disabled) { opacity: 0.88; }
    button#loadBtn:active:not(:disabled) { transform: scale(0.97); }
    button#loadBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Progress */
    #progressWrap { margin-bottom: 20px; display: none; }
    #progressLabel { font-size: 0.78rem; color: var(--muted); margin-bottom: 7px; }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.25s ease;
    }

    #errorMsg { color: var(--red); font-size: 0.875rem; margin-bottom: 16px; min-height: 1.2em; }

    /* Stats grid */
    #statsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .card-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .card-sub {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .card-value {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .good  { color: var(--green); }
    .bad   { color: var(--red); }
    .neutral { color: var(--blue); }

    /* Chart */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 18px 14px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    #trendChart { display: block; width: 100%; }

    /* Table */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .table-section h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 16px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      padding: 9px 14px;
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.018); }
    td.mono { font-family: 'Courier New', monospace; }
    td.good { color: var(--green); }
    td.bad  { color: var(--red); }
    td.zero { color: var(--muted); }
    td.course, td.competition { color: var(--accent); font-size: 0.8rem; max-width: 200px; cursor: pointer; position: relative; }
    td.course { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 18px; }
    td.course:hover { text-decoration: underline; }
    td.competition { white-space: normal; vertical-align: top; padding: 4px 4px 4px 0; }
    td.competition:hover { text-decoration: underline; }
    .comp-fi { opacity: 0; color: var(--muted); font-size: 0.8em; cursor: pointer; margin-right: 3px; user-select: none; transition: opacity 0.1s, color 0.1s; text-decoration: none; display: inline-block; }
    tr:hover .comp-fi { opacity: 0.7; }
    .comp-fi:hover { opacity: 1 !important; color: var(--accent); }
    td.course .filter-icon {
      position: absolute;
      right: 2px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.1s, color 0.1s;
      user-select: none;
    }
    tr:hover td.course .filter-icon { opacity: 1; }
    td.course .filter-icon:hover { color: var(--accent); }

    #filterBar {
      display: none;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }
    #filterBar .filter-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text);
    }
    #filterBar .filter-text strong { color: var(--accent); }
    #filterBar .filter-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 10px;
    }
    #filterBar button {
      background: var(--red);
      border: none;
      color: #fff;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    #filterBar button:hover { opacity: 0.85; }

    #results { display: none; }

    #version {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 0.7rem;
      color: var(--border);
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      input[type="text"] { width: 100%; }
      .controls { flex-direction: column; align-items: stretch; }
      button#loadBtn { width: 100%; }
      .card-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Discgolf Stats</h1>
    <p class="subtitle">Discgolf Metrix</p>
  </header>

  <div class="controls">
    <div class="field">
      <label>API Kood</label>
      <input type="text" id="apiCode" value="" autocomplete="off" spellcheck="false" placeholder="sisesta API kood">
    </div>
    <div class="field">
      <label>UserID</label>
      <input type="text" id="userID" autocomplete="off" spellcheck="false" placeholder="nt 2821">
    </div>
    <div class="field">
      <label>Ringe</label>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="countSelect">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="99999">K&otilde;ik</option>
        </select>
        <input type="number" id="countCustom" min="1" placeholder="muu arv">
      </div>
    </div>
    <button id="loadBtn" onclick="loadData()">Laadi</button>
  </div>
  <div id="cacheMsg" style="font-size:0.75rem;color:var(--muted);margin-bottom:12px;display:none;"></div>

  <div id="progressWrap">
    <div id="progressLabel">Laadimine...</div>
    <div class="progress-track"><div id="progressFill"></div></div>
  </div>

  <div id="errorMsg"></div>

  <div id="results">
    <div id="filterBar">
      <div class="filter-text">N&auml;itan ainult: <strong id="filterCourseName"></strong></div>
      <span class="filter-count" id="filterCount"></span>
      <button onclick="clearFilter()">&times; Eemalda filter</button>
    </div>

    <div id="statsGrid"></div>

    <div class="section">
      <h2>Skoor trend &mdash; Diff vs par</h2>
      <canvas id="trendChart" width="600" height="200"></canvas>
    </div>

    <div class="section" id="grhChartWrap" style="display:none">
      <h2>GRH% trend</h2>
      <canvas id="grhChart" width="600" height="160"></canvas>
    </div>

    <div class="section" id="puttsChartWrap" style="display:none">
      <h2>Putiprotsent &mdash; trend</h2>
      <canvas id="puttsChart" width="600" height="160"></canvas>
    </div>

    <div class="table-section">
      <h2>Viimased ringid</h2>
      <table>
        <thead>
          <tr>
            <th>Kuup&auml;ev</th>
            <th>V&otilde;istlus</th>
            <th>Rada</th>
            <th>Skoor</th>
            <th>Diff</th>
            <th>Koht</th>
          </tr>
        </thead>
        <tbody id="roundsBody"></tbody>
      </table>
    </div>
  </div>

  <div id="version"></div>

  <script>
    document.getElementById("version").textContent =
      "v1.38 \u00b7 " + new Date().toISOString().slice(0, 10);
    const API = "https://discgolfmetrix.com/api.php";

    const CACHE_KEY = "metrix_rounds_cache_v3";
    const CACHE_TTL = 3600000; // 60 minutes

    let allRoundsCache = []; // all valid rounds from last fetch
    let cachedPlayerName = null;

    function getCount() {
      const customVal = parseInt(document.getElementById("countCustom").value, 10);
      return customVal > 0 ? customVal : parseInt(document.getElementById("countSelect").value, 10);
    }

    function renderForCount() {
      const count = getCount();
      displayResults(allRoundsCache.slice(0, count), cachedPlayerName);
    }

    document.getElementById("countSelect").addEventListener("change", function() {
      document.getElementById("countCustom").value = "";
      if (allRoundsCache.length) renderForCount();
    });
    document.getElementById("countCustom").addEventListener("input", function() {
      if (allRoundsCache.length) renderForCount();
    });

    const savedCode = localStorage.getItem("metrix_api_code");
    const _savedUserInit = (() => { try { return JSON.parse(localStorage.getItem("metrix_user_id") || "null"); } catch (e) { return null; } })();
    if (_savedUserInit?.userId) document.getElementById("userID").value = _savedUserInit.userId;
    if (savedCode) {
      document.getElementById("apiCode").value = savedCode;
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
        if (cached && cached.code === savedCode && (Date.now() - cached.timestamp) < CACHE_TTL && cached.rounds?.length) {
          const ageMin = Math.round((Date.now() - cached.timestamp) / 60000);
          document.getElementById("cacheMsg").textContent = "Andmed cache'ist (" + ageMin + " min tagasi laetud). Vajuta \"Laadi\" et uuendada.";
          document.getElementById("cacheMsg").style.display = "block";
          allRoundsCache = cached.rounds;
          cachedPlayerName = cached.playerName || null;
          renderForCount();
        } else {
          loadData();
        }
      } catch (e) {
        loadData();
      }
    }

    function setProgress(pct, label) {
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressLabel").textContent = label;
    }

    function showError(msg) {
      document.getElementById("errorMsg").textContent = msg;
    }

    async function fetchJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    async function loadData() {
      const code = document.getElementById("apiCode").value.trim();

      showError("");
      document.getElementById("results").style.display = "none";
      document.getElementById("progressWrap").style.display = "block";
      document.getElementById("loadBtn").disabled = true;

      try {
        setProgress(5, "Laen võistluste nimekirja...");
        const list = await fetchJSON(API + "?content=my_competitions&code=" + encodeURIComponent(code));

        if (list.Errors && list.Errors.length) throw new Error(list.Errors.join(", "));

        const allIds = list.my_competitions || [];
        if (!allIds.length) throw new Error("Võistluste nimekiri on tühi.");

        // Fetch ALL IDs (newest first); valid rounds are sliced to count after filtering
        const toFetch = [...allIds].reverse();

        const inputUserID = document.getElementById("userID").value.trim();
        if (!inputUserID) {
          showError("Palun sisesta oma UserID (leiad Discgolf Metrix profiililt).");
          document.getElementById("progressWrap").style.display = "none";
          document.getElementById("loadBtn").disabled = false;
          return;
        }

        const BATCH = 5;
        const rounds = [];
        const _savedUser = (() => { try { return JSON.parse(localStorage.getItem("metrix_user_id") || "null"); } catch (e) { return null; } })();
        let myUserID = inputUserID;
        let myPlayerName = _savedUser?.userId === inputUserID ? (_savedUser.playerName || null) : null;

        for (let i = 0; i < toFetch.length; i += BATCH) {
          const batch = toFetch.slice(i, i + BATCH);

          const results = await Promise.all(
            batch.map(id =>
              fetchJSON(API + "?content=result&id=" + id + "&code=" + encodeURIComponent(code))
                .catch(() => null)
            )
          );

          for (const data of results) {
            if (!data || !data.Competition) continue;
            const id = data.Competition.ID;
            console.log("fetched id:", id, "competition date:", data.Competition?.Date);

            const compResults = data.Competition.Results;
            console.log("results count:", compResults?.length);
            if (!compResults || !compResults.length) {
              console.log("no results, skip");
              continue;
            }

            const candidate = compResults.find(r => String(r.UserID) === String(myUserID));
            if (!candidate) {
              console.log("player not found in round", id, "skip");
              continue;
            }

            // Condition: Sum > 0
            if (!(Number(candidate.Sum) > 0)) {
              console.log("Sum=0, skip");
              continue;
            }

            // Condition: PlayerResults has at least one hole object.
            // Mixed format possible: [[], {Result:"4",...}, []]
            // Only skip if ALL elements are empty arrays.
            const pr = candidate.PlayerResults || [];
            const tracks = data.Competition.Tracks || [];
            // Build validHoles with par value from Tracks by original index
            const validHoles = pr.reduce((acc, h, i) => {
              if (h !== null && !Array.isArray(h) && typeof h === "object") {
                const par = parseInt(tracks[i]?.Par || 0, 10);
                acc.push({ ...h, _par: par || null });
              }
              return acc;
            }, []);
            if (validHoles.length === 0) continue;

            const player = candidate;
            if (!myPlayerName && player.Name) {
              myPlayerName = player.Name;
              localStorage.setItem("metrix_user_id", JSON.stringify({ userId: myUserID, playerName: myPlayerName }));
            }

            console.log("VALID:", id, data.Competition?.Date, "diff:", player.Diff);

            // Stats were collected only if at least one hole has a meaningful value (> 0).
            // Checking for non-empty string ("0" !== "") gives a false positive for rounds
            // where MetrixMode="1" but no stats were entered (all fields are "0").
            const hasStats = validHoles.some(h =>
              Number(h.GRH) > 0 || Number(h.BUE) > 0 ||
              Number(h.ICP) > 0 || Number(h.IBP) > 0 || Number(h.OCP) > 0
            );

            // Always calculated (all rounds)
            const ocpTotal = validHoles.reduce((s, h) => s + Number(h.OCP || 0), 0);
            const penTotal = validHoles.reduce((s, h) => s + Number(h.PEN || 0), 0);
            const hio      = validHoles.filter(h => h.Result === "1").length;

            // Stats-only fields — null when not collected, excluded from cumulative totals
            let grhHits = null, bueHits = null;
            let puttsHoles = [], totalPutts = 0;
            let icpTotal = 0, icpMade = 0;
            let parHoles = [], parSaved = 0;
            let birdieHoles = [], birdieMade = 0;

            if (hasStats) {
              grhHits = validHoles.filter(h => Number(h.GRH) === 1).length;
              bueHits = validHoles.filter(h => Number(h.BUE) === 1).length;

              // Putiprotsent: only holes where ICP+IBP > 0
              puttsHoles = validHoles.filter(h =>
                h.ICP !== "" && h.IBP !== "" && (Number(h.ICP) + Number(h.IBP)) > 0
              );
              totalPutts = puttsHoles.reduce((s, h) => s + Number(h.ICP) + Number(h.IBP), 0);

              // ICP putiprotsent: all holes where ICP>0, made=1 if IBP=0
              const icpHoles = validHoles.filter(h => h.ICP !== "" && Number(h.ICP) > 0);
              icpTotal = icpHoles.reduce((s, h) => s + Number(h.ICP), 0);
              icpMade  = icpHoles.filter(h => Number(h.IBP) === 0).length;

              // Birdie putiprotsent: GRH=1, ICP>=1, ei ace, ei trahvi; made=ICP=1 ja IBP=0
              birdieHoles = validHoles.filter(h =>
                h.Result !== "1" && h.ICP !== "" &&
                Number(h.GRH) === 1 && Number(h.ICP) >= 1 &&
                Number(h.PEN) === 0
              );
              birdieMade = birdieHoles.filter(h =>
                Number(h.ICP) === 1 && Number(h.IBP) === 0
              ).length;

              // PAR putiprotsent
              // Juht A (GRH=1): birdie miss → par putt. Tingimus: icp>=2, ei ace, ei PEN.
              // Juht B (GRH=0): scramble par save. Tingimus: icp>=1, Diff=0 (made) või Diff=1 (miss).
              // OCP-d ei välistata — mängija võis enne C2 proovida (legitiimne).
              // Made mõlemal juhul: Diff===0.
              parHoles = validHoles.filter(h => {
                if (h.Result === "1") return false;
                if (h.ICP === "") return false;
                if (Number(h.PEN) > 0) return false;
                const grh = Number(h.GRH), icp = Number(h.ICP), diff = Number(h.Diff);
                if (grh === 1) return icp >= 2;
                if (icp < 1) return false;
                return diff === 0 || diff === 1;
              });
              parSaved = parHoles.filter(h => Number(h.Diff) === 0).length;
            }

            // Cross-validate calculated values against API totals
            {
              const pctToNum = s => { const n = parseFloat(String(s).replace("%", "")); return Number.isFinite(n) ? n : null; };
              const tol = 1;
              const warn = (metric, calc, api) => console.warn("Stats mismatch round", id, { metric, calc, api });

              const sumCalc = validHoles.reduce((s, h) => s + parseInt(h.Result, 10), 0);
              if (sumCalc !== Number(player.Sum)) warn("Sum", sumCalc, Number(player.Sum));

              if (hasStats) {
                const grhApi = pctToNum(player.GRHTotal);
                const grhCalc = validHoles.length > 0 ? grhHits / validHoles.length * 100 : null;
                if (grhCalc !== null && grhApi !== null && Math.abs(grhCalc - grhApi) > tol) warn("GRH%", grhCalc.toFixed(2), grhApi);

                const bueApi = pctToNum(player.BUETotal);
                const bueCalc = validHoles.length > 0 ? bueHits / validHoles.length * 100 : null;
                if (bueCalc !== null && bueApi !== null && Math.abs(bueCalc - bueApi) > tol) warn("BUE%", bueCalc.toFixed(2), bueApi);

                const c1Api = pctToNum(player.ICPTotal);
                const c1Calc = icpTotal > 0 ? icpMade / icpTotal * 100 : null;
                if (c1Calc !== null && c1Api !== null && Math.abs(c1Calc - c1Api) > tol) warn("ICP%", c1Calc.toFixed(2), c1Api);

                const ibpCalc = validHoles.filter(h => Number(h.IBP) === 1).length;
                const ibpApi = parseInt(player.IBPTotal || "0", 10);
                if (Number.isFinite(ibpApi) && ibpCalc !== ibpApi) warn("IBP count", ibpCalc, ibpApi);

                const ocpApi = parseInt(player.OCPTotal || "0", 10);
                if (Number.isFinite(ocpApi) && ocpTotal !== ocpApi) warn("OCP count", ocpTotal, ocpApi);
              }
            }

            rounds.push({
              date:          data.Competition.Date || "",
              name:          data.Competition.Name || "",
              nameParts:     (data.Competition.Name || "").split(" - ").map(s => s.trim()).filter(Boolean),
              competitionID: data.Competition.ID || null,
              course:        data.Competition.CourseName || data.Competition.Name || "",
              courseID:      data.Competition.CourseID || null,
              sum:           Number(player.Sum),
              diff:          Number(player.Diff),
              place:         player.Place,
              holeCount:     validHoles.length,
              hio,
              hasStats,
              grhHits,
              bueHits,
              ocpTotal,
              penTotal,
              puttHoles:        hasStats ? puttsHoles.length : null,
              totalPutts:       hasStats ? totalPutts : null,
              icpAttempts:      hasStats ? icpTotal : null,
              icpMade:          hasStats ? icpMade : null,
              parOpportunities: hasStats ? parHoles.length : null,
              parSaved:         hasStats ? parSaved : null,
              birdieOpportunities: hasStats ? birdieHoles.length : null,
              birdieMade:       hasStats ? birdieMade : null,
              // Per-round values for trend charts only
              grhPct:  hasStats && validHoles.length > 0 ? grhHits / validHoles.length * 100 : null,
              puttPct: hasStats && puttsHoles.length > 0 && totalPutts > 0 ? puttsHoles.length / totalPutts * 100 : null,
            });
          }

          const done = Math.min(i + BATCH, toFetch.length);
          const pct = 10 + Math.round((done / toFetch.length) * 86);
          setProgress(pct, "Laetud " + done + " / " + toFetch.length + " võistlust...");
        }

        setProgress(100, "Valmis!");

        // Sort all valid rounds newest-first
        rounds.sort((a, b) => b.date.localeCompare(a.date));

        if (rounds.length === 0) {
          showError("Kehtivaid ringe ei leitud.");
        } else {
          localStorage.setItem("metrix_api_code", code);
          localStorage.setItem(CACHE_KEY, JSON.stringify({ rounds, timestamp: Date.now(), code, playerName: myPlayerName }));
          document.getElementById("cacheMsg").style.display = "none";
          allRoundsCache = rounds;
          cachedPlayerName = myPlayerName;
          renderForCount();
        }
      } catch (e) {
        showError("Viga: " + e.message);
      } finally {
        setTimeout(() => {
          document.getElementById("progressWrap").style.display = "none";
        }, 400);
        document.getElementById("loadBtn").disabled = false;
      }
    }

    let allRounds = [];
    let activeFilter = null; // {type:'course'|'prefix', id?, parts?, name} or null

    // Event delegation
    document.getElementById("roundsBody").addEventListener("click", function(e) {
      // .comp-fi icon → hierarchical prefix filter
      const compFi = e.target.closest(".comp-fi");
      if (compFi) {
        setPrefixFilter(JSON.parse(compFi.dataset.parts));
        return;
      }
      // Course filter icon → course filter
      const filterIcon = e.target.closest(".filter-icon");
      if (filterIcon) {
        const row = filterIcon.closest("tr");
        setFilter("course", row.dataset.courseId, row.dataset.courseName);
        return;
      }
      // Course cell → open Metrix course page
      const courseCell = e.target.closest("td.course[data-course-id]");
      if (courseCell) {
        window.open("https://discgolfmetrix.com/course/" + courseCell.dataset.courseId, "_blank");
        return;
      }
      // Competition cell → open Metrix competition page
      const compCell = e.target.closest("td.competition[data-competition-id]");
      if (compCell) {
        window.open("https://discgolfmetrix.com/" + compCell.dataset.competitionId, "_blank");
      }
    });

    function diffClass(v) {
      if (v < 0) return "good";
      if (v > 0) return "bad";
      return "neutral";
    }

    function fmtDiff(v, decimals) {
      const n = decimals !== undefined
        ? parseFloat(v.toFixed(decimals))
        : Math.round(v);
      if (n === 0) return "E";
      return (n > 0 ? "+" : "") + (decimals !== undefined ? v.toFixed(decimals) : n);
    }

    function setFilter(type, id, name) {
      activeFilter = { type, id: String(id), name };
      renderView();
    }

    function setPrefixFilter(parts) {
      activeFilter = { type: "prefix", parts, name: parts.join(" › ") };
      renderView();
    }

    function clearFilter() {
      activeFilter = null;
      renderView();
    }

    function displayResults(rounds, playerName) {
      allRounds = rounds;
      activeFilter = null;
      if (playerName) {
        document.querySelector("header p.subtitle").textContent = playerName;
        document.title = "Discgolf Stats \u2013 " + playerName;
      }
      document.getElementById("results").style.display = "block";
      renderView();
    }

    function renderView() {
      const filtered = activeFilter
        ? allRounds.filter(r => {
            if (activeFilter.type === "prefix") {
              const rParts = r.nameParts && r.nameParts.length
                ? r.nameParts
                : (r.name || "").split(" - ").map(s => s.trim()).filter(Boolean);
              return activeFilter.parts.every((p, i) => rParts[i] === p);
            }
            return String(r.courseID) === activeFilter.id;
          })
        : allRounds;

      // Filter bar
      const bar = document.getElementById("filterBar");
      if (activeFilter) {
        document.getElementById("filterCourseName").textContent = activeFilter.name;
        document.getElementById("filterCount").textContent = filtered.length + " ringi";
        bar.style.display = "flex";
      } else {
        bar.style.display = "none";
      }

      // Chronological for chart/stats
      const chrono = [...filtered].sort((a, b) => a.date.localeCompare(b.date));
      const diffs = chrono.map(r => r.diff);

      const best  = Math.min(...diffs);
      const worst = Math.max(...diffs);
      const avg   = diffs.reduce((s, d) => s + d, 0) / diffs.length;
      const last10diffs = activeFilter ? diffs : diffs.slice(-10);
      const avg10 = last10diffs.reduce((s, d) => s + d, 0) / last10diffs.length;

      const n = chrono.length;
      const statsRounds = chrono.filter(r => r.hasStats);
      const sumR  = (arr, key) => arr.reduce((s, r) => s + (r[key] || 0), 0);
      const pct   = (num, den) => den > 0 ? (num / den * 100).toFixed(1) + "%" : "—";
      const avgFmt = (num, den) => den > 0 ? (num / den).toFixed(2) : "—";

      const totalHIO   = sumR(chrono, "hio");
      // Stats-only sums (only rounds where Metrix stats were collected)
      const totalHoles = sumR(statsRounds, "holeCount");
      const grhSum     = sumR(statsRounds, "grhHits");
      const bueSum     = sumR(statsRounds, "bueHits");
      const puttH      = sumR(statsRounds, "puttHoles");
      const puttT      = sumR(statsRounds, "totalPutts");
      const icpAtt     = sumR(statsRounds, "icpAttempts");
      const icpMadeSum = sumR(statsRounds, "icpMade");
      const parOpp     = sumR(statsRounds, "parOpportunities");
      const parSvd     = sumR(statsRounds, "parSaved");
      const birdOpp    = sumR(statsRounds, "birdieOpportunities");
      const birdMade   = sumR(statsRounds, "birdieMade");
      // OCP only from stats rounds (field is 0 in non-stats rounds, would dilute average)
      const ocpSum     = sumR(statsRounds, "ocpTotal");
      const penSum     = sumR(chrono, "penTotal");

      const baseCards = activeFilter ? [
        { label: "Mängitud kordi",  value: filtered.length,    cls: "neutral" },
        { label: "Parim ring",      value: fmtDiff(best),      cls: diffClass(best) },
        { label: "Halvim ring",     value: fmtDiff(worst),     cls: diffClass(worst) },
        { label: "Keskmine diff",   value: fmtDiff(avg, 1),    cls: diffClass(avg) },
      ] : [
        { label: "Ringe kokku",      value: allRounds.length,   cls: "neutral" },
        { label: "Parim ring",       value: fmtDiff(best),      cls: diffClass(best) },
        { label: "Halvim ring",      value: fmtDiff(worst),     cls: diffClass(worst) },
        { label: "Keskmine diff",    value: fmtDiff(avg, 1),    cls: diffClass(avg) },
        { label: "Viimane 10 (avg)", value: fmtDiff(avg10, 1),  cls: diffClass(avg10) },
      ];

      const penAvg = n > 0 ? penSum / n : 0;

      const ns = statsRounds.length;

      const statCards = [
        { label: "GRH%",             value: pct(grhSum, totalHoles),  cls: "neutral", sub: ns + "/" + n + " ringist" },
        { label: "BUE%",             value: pct(bueSum, totalHoles),  cls: "neutral", sub: ns + "/" + n + " ringist" },
        { label: "OCP",              value: avgFmt(ocpSum, ns),        cls: "neutral", sub: ns + "/" + n + " ringist" },
        { label: "Trahvid",          value: avgFmt(penSum, n),         cls: penAvg > 0 ? "bad" : "neutral", sub: n + " ringist" },
        { label: "Putiprotsent",     value: pct(puttH, puttT),        cls: "neutral", sub: ns + "/" + n + " ringist" },
        { label: "ICP putiprot.",    value: pct(icpMadeSum, icpAtt),  cls: "neutral", sub: icpAtt + " katset" },
        { label: "PAR putiprotsent", value: pct(parSvd, parOpp),      cls: "neutral", sub: parOpp + " katset" },
        { label: "Birdie putiprot.", value: pct(birdMade, birdOpp),   cls: "neutral", sub: birdOpp + " katset" },
        { label: "Hole-in-one",      value: totalHIO,                 cls: totalHIO > 0 ? "good" : "neutral", sub: "kokku" },
      ];

      const allCards = [...baseCards, ...statCards];
      document.getElementById("statsGrid").innerHTML = allCards.map(c => `
        <div class="card">
          <div class="card-label">${c.label}</div>
          <div class="card-value ${c.cls}">${c.value}</div>
          ${c.sub ? `<div class="card-sub">${c.sub}</div>` : ""}
        </div>
      `).join("");

      // Table: newest first
      // Course cell → opens Metrix page; filter icon → sets course filter
      document.getElementById("roundsBody").innerHTML = chrono.slice().reverse().map(r => {
        const dc = diffClass(r.diff);
        const esc = s => String(s).replace(/"/g, "&quot;");
        const filterIcon = activeFilter ? "" : `<span class="filter-icon" title="Filtreeri selle raja järgi">⊕</span>`;
        const courseCell = `<td class="course" data-course-id="${esc(r.courseID)}">${r.course}${filterIcon}</td>`;
        const parts = r.nameParts && r.nameParts.length
          ? r.nameParts
          : (r.name || "").split(" - ").map(s => s.trim()).filter(Boolean);
        const compContent = activeFilter
          ? esc(r.name)
          : parts.map((part, i) => {
              const prefix = JSON.stringify(parts.slice(0, i + 1));
              const indentStyle = i > 0 ? ` style="padding-left:${i * 0.8}em"` : "";
              const icon = `<span class="comp-fi" data-parts='${prefix}' title="Filtreeri: ${esc(parts.slice(0,i+1).join(" › "))}">⊕</span>`;
              return `<div${indentStyle}>${icon}${esc(part)}</div>`;
            }).join("");
        const compCell = `<td class="competition" data-competition-id="${esc(r.competitionID)}" title="${esc(r.name)}">${compContent}</td>`;
        return `<tr data-course-id="${esc(r.courseID)}" data-course-name="${esc(r.course)}">
          <td>${r.date}</td>
          ${compCell}
          ${courseCell}
          <td class="mono">${r.sum}</td>
          <td class="mono ${dc}">${fmtDiff(r.diff)}</td>
          <td class="mono">${r.place != null ? r.place : "–"}</td>
        </tr>`;
      }).join("");

      drawChart(chrono);

      // GRH% trend — only show if at least 2 rounds have data
      const grhPoints = chrono.filter(r => r.grhPct !== null);
      document.getElementById("grhChartWrap").style.display = grhPoints.length >= 2 ? "block" : "none";
      if (grhPoints.length >= 2) drawLineChart("grhChart", grhPoints, r => r.grhPct, { color: "#3b82f6", suffix: "%" });

      // Putiprotsent trend
      const puttsPoints = chrono.filter(r => r.puttPct !== null);
      document.getElementById("puttsChartWrap").style.display = puttsPoints.length >= 2 ? "block" : "none";
      if (puttsPoints.length >= 2) drawLineChart("puttsChart", puttsPoints, r => r.puttPct, { color: "#a78bfa", suffix: "%" });
    }

    function drawLineChart(canvasId, rounds, getValue, { color = "#10b981", suffix = "" } = {}) {
      const canvas = document.getElementById(canvasId);
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.parentElement.clientWidth;
      const H = 160;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + "px";
      canvas.style.height = H + "px";
      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      const vals  = rounds.map(getValue);
      const minV  = Math.min(...vals);
      const maxV  = Math.max(...vals);
      const range = maxV - minV || 1;
      const pad   = { top: 12, right: 14, bottom: 32, left: 44 };
      const cw    = W - pad.left - pad.right;
      const ch    = H - pad.top  - pad.bottom;

      // Grid lines
      for (let i = 0; i <= 4; i++) {
        const y   = pad.top + (ch / 4) * i;
        const val = maxV - (range / 4) * i;
        ctx.strokeStyle = "#2a2d3e";
        ctx.lineWidth   = 1;
        ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
        ctx.fillStyle  = "#64748b";
        ctx.font       = "10px 'Courier New', monospace";
        ctx.textAlign  = "right";
        ctx.fillText(val.toFixed(suffix === "%" ? 0 : 1) + suffix, pad.left - 5, y + 4);
      }

      const pts = rounds.map((r, i) => ({
        x: pad.left + (i / (rounds.length - 1)) * cw,
        y: pad.top  + ch * (1 - (getValue(r) - minV) / range),
      }));

      // Gradient fill
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      const hex  = color.replace("#", "");
      const ri   = parseInt(hex.slice(0,2),16), gi = parseInt(hex.slice(2,4),16), bi = parseInt(hex.slice(4,6),16);
      grad.addColorStop(0, `rgba(${ri},${gi},${bi},0.25)`);
      grad.addColorStop(1, `rgba(${ri},${gi},${bi},0)`);

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[pts.length-1].x, pad.top + ch);
      ctx.lineTo(pts[0].x, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = color;
      ctx.lineWidth   = 2;
      ctx.lineJoin    = "round";
      ctx.stroke();

      // Dots
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle   = color;
        ctx.strokeStyle = "#0f1117";
        ctx.lineWidth   = 1.5;
        ctx.fill(); ctx.stroke();
      }

      // X-axis labels
      const maxL = Math.min(rounds.length, 8);
      const step = Math.ceil((rounds.length - 1) / (maxL - 1)) || 1;
      ctx.fillStyle = "#64748b"; ctx.font = "10px system-ui"; ctx.textAlign = "center";
      for (let i = 0; i < rounds.length; i += step)
        ctx.fillText(rounds[i].date.slice(5), pts[i].x, H - pad.bottom + 16);
      if ((rounds.length - 1) % step !== 0) {
        const last = rounds.length - 1;
        ctx.fillText(rounds[last].date.slice(5), pts[last].x, H - pad.bottom + 16);
      }
    }

    function drawChart(rounds) {
      const canvas = document.getElementById("trendChart");
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.parentElement.clientWidth;
      const H = 220;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + "px";
      canvas.style.height = H + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      if (rounds.length < 2) {
        ctx.fillStyle = "#64748b";
        ctx.font = "13px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("Liiga vähe andmeid graafiku jaoks.", W / 2, H / 2);
        return;
      }

      const diffs  = rounds.map(r => r.diff);
      const minD   = Math.min(...diffs);
      const maxD   = Math.max(...diffs);
      const range  = maxD - minD || 1;
      const pad    = { top: 14, right: 14, bottom: 38, left: 42 };
      const cw     = W - pad.left - pad.right;
      const ch     = H - pad.top  - pad.bottom;

      // Horizontal grid lines
      const ySteps = 4;
      for (let i = 0; i <= ySteps; i++) {
        const y   = pad.top + (ch / ySteps) * i;
        const val = maxD - ((maxD - minD) / ySteps) * i;

        ctx.strokeStyle = "#2a2d3e";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + cw, y);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "10px 'Courier New', monospace";
        ctx.textAlign = "right";
        ctx.fillText(fmtDiff(val, 0), pad.left - 6, y + 4);
      }

      // Zero line
      if (minD < 0 && maxD > 0) {
        const zy = pad.top + ch * (maxD / range);
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth   = 1;
        ctx.setLineDash([4, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.left, zy);
        ctx.lineTo(pad.left + cw, zy);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Data points
      const pts = rounds.map((r, i) => ({
        x: pad.left + (i / (rounds.length - 1)) * cw,
        y: pad.top  + ch * (1 - (r.diff - minD) / range),
        date: r.date,
      }));

      // Fill gradient
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      grad.addColorStop(0,   "rgba(16,185,129,0.28)");
      grad.addColorStop(1,   "rgba(16,185,129,0)");

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
      ctx.lineTo(pts[0].x, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = "#10b981";
      ctx.lineWidth   = 2;
      ctx.lineJoin    = "round";
      ctx.stroke();

      // Dots
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle   = "#10b981";
        ctx.strokeStyle = "#0f1117";
        ctx.lineWidth   = 1.5;
        ctx.fill();
        ctx.stroke();
      }

      // X-axis date labels (at most 8)
      const maxLabels = Math.min(rounds.length, 8);
      const step = Math.ceil((rounds.length - 1) / (maxLabels - 1));
      ctx.fillStyle  = "#64748b";
      ctx.font       = "10px system-ui";
      ctx.textAlign  = "center";
      for (let i = 0; i < rounds.length; i += step) {
        const label = rounds[i].date.slice(5); // MM-DD
        ctx.fillText(label, pts[i].x, H - pad.bottom + 18);
      }
      // Always label last point
      if ((rounds.length - 1) % step !== 0) {
        const last = rounds.length - 1;
        ctx.fillText(rounds[last].date.slice(5), pts[last].x, H - pad.bottom + 18);
      }
    }

    // Redraw chart on resize
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (document.getElementById("results").style.display !== "none") {
          // re-fetch stored rounds from DOM isn't possible; rely on user reloading
        }
      }, 200);
    });
  </script>
</body>
