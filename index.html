<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discgolf Stats – Kristjan Liiv</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #60a5fa;
      --accent: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 16px 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    header { margin-bottom: 28px; }
    h1 { font-size: 1.6rem; color: var(--accent); letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      width: 300px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }
    button#loadBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 24px;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button#loadBtn:hover:not(:disabled) { opacity: 0.88; }
    button#loadBtn:active:not(:disabled) { transform: scale(0.97); }
    button#loadBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Progress */
    #progressWrap { margin-bottom: 20px; display: none; }
    #progressLabel { font-size: 0.78rem; color: var(--muted); margin-bottom: 7px; }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.25s ease;
    }

    #errorMsg { color: var(--red); font-size: 0.875rem; margin-bottom: 16px; min-height: 1.2em; }

    /* Stats grid */
    #statsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .card-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .card-value {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .good  { color: var(--green); }
    .bad   { color: var(--red); }
    .neutral { color: var(--blue); }

    /* Chart */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 18px 14px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    #trendChart { display: block; width: 100%; }

    /* Table */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .table-section h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 16px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      padding: 9px 14px;
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.018); }
    td.mono { font-family: 'Courier New', monospace; }
    td.good { color: var(--green); }
    td.bad  { color: var(--red); }
    td.zero { color: var(--muted); }
    td.course { color: var(--accent); font-size: 0.8rem; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    td.course:hover { text-decoration: underline; }
    td.filter-btn { width: 28px; padding: 0 8px 0 0; text-align: right; }
    td.filter-btn span {
      display: inline-block;
      opacity: 0;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.1s, color 0.1s;
      line-height: 1;
      user-select: none;
    }
    tr:hover td.filter-btn span { opacity: 1; }
    td.filter-btn span:hover { color: var(--accent); }

    #filterBar {
      display: none;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 2px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }
    #filterBar .filter-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text);
    }
    #filterBar .filter-text strong { color: var(--accent); }
    #filterBar .filter-count {
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 10px;
    }
    #filterBar button {
      background: var(--red);
      border: none;
      color: #fff;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    #filterBar button:hover { opacity: 0.85; }

    #results { display: none; }

    #version {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 0.7rem;
      color: var(--border);
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      input[type="text"] { width: 100%; }
      .controls { flex-direction: column; align-items: stretch; }
      button#loadBtn { width: 100%; }
      .card-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Discgolf Stats</h1>
    <p class="subtitle">Discgolf Metrix</p>
  </header>

  <div class="controls">
    <div class="field">
      <label>API Kood</label>
      <input type="text" id="apiCode" value="" autocomplete="off" spellcheck="false" placeholder="sisesta API kood">
    </div>
    <div class="field">
      <label>Voore</label>
      <select id="countSelect">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <button id="loadBtn" onclick="loadData()">Laadi</button>
  </div>

  <div id="progressWrap">
    <div id="progressLabel">Laadimine...</div>
    <div class="progress-track"><div id="progressFill"></div></div>
  </div>

  <div id="errorMsg"></div>

  <div id="results">
    <div id="filterBar">
      <div class="filter-text">N&auml;itan ainult: <strong id="filterCourseName"></strong></div>
      <span class="filter-count" id="filterCount"></span>
      <button onclick="clearFilter()">&times; Eemalda filter</button>
    </div>

    <div id="statsGrid"></div>

    <div class="section">
      <h2>Skoor trend &mdash; Diff vs par</h2>
      <canvas id="trendChart" width="600" height="200"></canvas>
    </div>

    <div class="table-section">
      <h2>Viimased voorud</h2>
      <table>
        <thead>
          <tr>
            <th>Kuup&auml;ev</th>
            <th>Rada</th>
            <th>Skoor</th>
            <th>Diff</th>
            <th>Koht</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="roundsBody"></tbody>
      </table>
    </div>
  </div>

  <div id="version"></div>

  <script>
    document.getElementById("version").textContent =
      "v1.14 \u00b7 " + new Date().toISOString().slice(0, 10);
    const API = "https://discgolfmetrix.com/api.php";

    const savedCode = localStorage.getItem("metrix_api_code");
    if (savedCode) {
      document.getElementById("apiCode").value = savedCode;
      loadData();
    }

    function setProgress(pct, label) {
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressLabel").textContent = label;
    }

    function showError(msg) {
      document.getElementById("errorMsg").textContent = msg;
    }

    async function fetchJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    async function loadData() {
      const code = document.getElementById("apiCode").value.trim();
      const count = parseInt(document.getElementById("countSelect").value, 10);

      showError("");
      document.getElementById("results").style.display = "none";
      document.getElementById("progressWrap").style.display = "block";
      document.getElementById("loadBtn").disabled = true;

      try {
        setProgress(5, "Laen võistluste nimekirja...");
        const list = await fetchJSON(API + "?content=my_competitions&code=" + encodeURIComponent(code));

        if (list.Errors && list.Errors.length) throw new Error(list.Errors.join(", "));

        const allIds = list.my_competitions || [];
        if (!allIds.length) throw new Error("Võistluste nimekiri on tühi.");

        // Take last N (newest first after reverse)
        const toFetch = allIds.slice(-count).reverse();

        const BATCH = 5;
        const rounds = [];
        let myUserID = null;
        let myPlayerName = null;

        for (let i = 0; i < toFetch.length; i += BATCH) {
          const batch = toFetch.slice(i, i + BATCH);

          const results = await Promise.all(
            batch.map(id =>
              fetchJSON(API + "?content=result&id=" + id + "&code=" + encodeURIComponent(code))
                .catch(() => null)
            )
          );

          for (const data of results) {
            if (!data || !data.Competition) continue;

            const compResults = data.Competition.Results;
            if (!compResults || !compResults.length) continue;

            // On first valid round, learn UserID and name from Results[0]
            if (myUserID === null) {
              myUserID = String(compResults[0].UserID);
              myPlayerName = compResults[0].Name || null;
            }
            const player = compResults.find(r => String(r.UserID) === myUserID);
            if (!player) continue;

            // Condition 3: DNF === null
            if (player.DNF !== null && player.DNF !== undefined) continue;

            // Condition 2: Sum > 0
            if (!(Number(player.Sum) > 0)) continue;

            // Condition 4: PlayerResults has at least one hole object.
            // Mixed format possible: [[], {Result:"4",...}, []]
            // Only skip if ALL elements are empty arrays.
            const pr = player.PlayerResults || [];
            const validHoles = pr.filter(h => h !== null && !Array.isArray(h) && typeof h === "object");
            if (validHoles.length === 0) continue;

            // Compute per-hole stats from PlayerResults (fields are strings "0"/"1")
            const totalHoles = validHoles.length;
            const bue = validHoles.filter(h => h.BUE === "1").length;
            const grh = validHoles.filter(h => h.GRH === "1").length;
            const icp = validHoles.filter(h => h.ICP === "1").length;

            rounds.push({
              date:     data.Competition.Date || "",
              name:     data.Competition.Name || "",
              course:   data.Competition.CourseName || data.Competition.Name || "",
              courseID: data.Competition.CourseID || null,
              sum:      Number(player.Sum),
              diff:     Number(player.Diff),
              place:    player.Place,
              holes:    totalHoles,
              bue,
              grh,
              icp,
            });
          }

          const done = Math.min(i + BATCH, toFetch.length);
          const pct = 10 + Math.round((done / toFetch.length) * 86);
          setProgress(pct, "Laetud " + done + " / " + toFetch.length + " võistlust...");
        }

        setProgress(100, "Valmis!");

        if (rounds.length === 0) {
          showError("Kehtivaid voore ei leitud.");
        } else {
          localStorage.setItem("metrix_api_code", code);
          displayResults(rounds, myPlayerName);
        }
      } catch (e) {
        showError("Viga: " + e.message);
      } finally {
        setTimeout(() => {
          document.getElementById("progressWrap").style.display = "none";
        }, 400);
        document.getElementById("loadBtn").disabled = false;
      }
    }

    let allRounds = [];
    let activeFilter = null; // courseID of active filter, or null

    // Event delegation: course name → open Metrix; filter icon → set filter
    document.getElementById("roundsBody").addEventListener("click", function(e) {
      const filterIcon = e.target.closest("td.filter-btn span");
      if (filterIcon) {
        const row = filterIcon.closest("tr");
        setFilter(row.dataset.courseId, row.dataset.courseName);
        return;
      }
      const courseCell = e.target.closest("td.course[data-course-id]");
      if (courseCell) {
        window.open("https://discgolfmetrix.com/course/" + courseCell.dataset.courseId, "_blank");
      }
    });

    function diffClass(v) {
      if (v < 0) return "good";
      if (v > 0) return "bad";
      return "neutral";
    }

    function fmtDiff(v, decimals) {
      const n = decimals !== undefined
        ? parseFloat(v.toFixed(decimals))
        : Math.round(v);
      if (n === 0) return "E";
      return (n > 0 ? "+" : "") + (decimals !== undefined ? v.toFixed(decimals) : n);
    }

    function setFilter(courseID, courseName) {
      activeFilter = { id: String(courseID), name: courseName };
      renderView();
    }

    function clearFilter() {
      activeFilter = null;
      renderView();
    }

    function displayResults(rounds, playerName) {
      allRounds = rounds;
      activeFilter = null;
      if (playerName) {
        document.querySelector("header p.subtitle").textContent = playerName;
        document.title = "Discgolf Stats \u2013 " + playerName;
      }
      document.getElementById("results").style.display = "block";
      renderView();
    }

    function renderView() {
      const filtered = activeFilter
        ? allRounds.filter(r => String(r.courseID) === activeFilter.id)
        : allRounds;

      // Filter bar
      const bar = document.getElementById("filterBar");
      if (activeFilter) {
        document.getElementById("filterCourseName").textContent = activeFilter.name;
        document.getElementById("filterCount").textContent = filtered.length + " vooru";
        bar.style.display = "flex";
      } else {
        bar.style.display = "none";
      }

      // Chronological for chart/stats
      const chrono = [...filtered].sort((a, b) => a.date.localeCompare(b.date));
      const diffs = chrono.map(r => r.diff);

      const best  = Math.min(...diffs);
      const worst = Math.max(...diffs);
      const avg   = diffs.reduce((s, d) => s + d, 0) / diffs.length;
      const last10diffs = activeFilter ? diffs : diffs.slice(-10);
      const avg10 = last10diffs.reduce((s, d) => s + d, 0) / last10diffs.length;

      const cards = activeFilter ? [
        { label: "Mängitud kordi",  value: filtered.length,    cls: "neutral" },
        { label: "Parim voor",      value: fmtDiff(best),      cls: diffClass(best) },
        { label: "Halvim voor",     value: fmtDiff(worst),     cls: diffClass(worst) },
        { label: "Keskmine diff",   value: fmtDiff(avg, 1),    cls: diffClass(avg) },
      ] : [
        { label: "Voore kokku",      value: allRounds.length,   cls: "neutral" },
        { label: "Parim voor",       value: fmtDiff(best),      cls: diffClass(best) },
        { label: "Halvim voor",      value: fmtDiff(worst),     cls: diffClass(worst) },
        { label: "Keskmine diff",    value: fmtDiff(avg, 1),    cls: diffClass(avg) },
        { label: "Viimane 10 (avg)", value: fmtDiff(avg10, 1),  cls: diffClass(avg10) },
      ];

      document.getElementById("statsGrid").innerHTML = cards.map(c => `
        <div class="card">
          <div class="card-label">${c.label}</div>
          <div class="card-value ${c.cls}">${c.value}</div>
        </div>
      `).join("");

      // Table: newest first
      // Course cell → opens Metrix page; filter icon → sets course filter
      document.getElementById("roundsBody").innerHTML = chrono.slice().reverse().map(r => {
        const dc = diffClass(r.diff);
        const esc = s => String(s).replace(/"/g, "&quot;");
        const courseCell = `<td class="course" data-course-id="${esc(r.courseID)}">${r.course}</td>`;
        const filterCell = activeFilter
          ? `<td class="filter-btn"></td>`
          : `<td class="filter-btn"><span title="Filtreeri selle raja järgi">⊕</span></td>`;
        return `<tr data-course-id="${esc(r.courseID)}" data-course-name="${esc(r.course)}">
          <td>${r.date}</td>
          ${courseCell}
          <td class="mono">${r.sum}</td>
          <td class="mono ${dc}">${fmtDiff(r.diff)}</td>
          <td class="mono">${r.place != null ? r.place : "–"}</td>
          ${filterCell}
        </tr>`;
      }).join("");

      drawChart(chrono);
    }

    function drawChart(rounds) {
      const canvas = document.getElementById("trendChart");
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.parentElement.clientWidth;
      const H = 220;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + "px";
      canvas.style.height = H + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      if (rounds.length < 2) {
        ctx.fillStyle = "#64748b";
        ctx.font = "13px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("Liiga vähe andmeid graafiku jaoks.", W / 2, H / 2);
        return;
      }

      const diffs  = rounds.map(r => r.diff);
      const minD   = Math.min(...diffs);
      const maxD   = Math.max(...diffs);
      const range  = maxD - minD || 1;
      const pad    = { top: 14, right: 14, bottom: 38, left: 42 };
      const cw     = W - pad.left - pad.right;
      const ch     = H - pad.top  - pad.bottom;

      // Horizontal grid lines
      const ySteps = 4;
      for (let i = 0; i <= ySteps; i++) {
        const y   = pad.top + (ch / ySteps) * i;
        const val = maxD - ((maxD - minD) / ySteps) * i;

        ctx.strokeStyle = "#2a2d3e";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + cw, y);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "10px 'Courier New', monospace";
        ctx.textAlign = "right";
        ctx.fillText(fmtDiff(val, 0), pad.left - 6, y + 4);
      }

      // Zero line
      if (minD < 0 && maxD > 0) {
        const zy = pad.top + ch * (maxD / range);
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth   = 1;
        ctx.setLineDash([4, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.left, zy);
        ctx.lineTo(pad.left + cw, zy);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Data points
      const pts = rounds.map((r, i) => ({
        x: pad.left + (i / (rounds.length - 1)) * cw,
        y: pad.top  + ch * (1 - (r.diff - minD) / range),
        date: r.date,
      }));

      // Fill gradient
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      grad.addColorStop(0,   "rgba(16,185,129,0.28)");
      grad.addColorStop(1,   "rgba(16,185,129,0)");

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
      ctx.lineTo(pts[0].x, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = "#10b981";
      ctx.lineWidth   = 2;
      ctx.lineJoin    = "round";
      ctx.stroke();

      // Dots
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle   = "#10b981";
        ctx.strokeStyle = "#0f1117";
        ctx.lineWidth   = 1.5;
        ctx.fill();
        ctx.stroke();
      }

      // X-axis date labels (at most 8)
      const maxLabels = Math.min(rounds.length, 8);
      const step = Math.ceil((rounds.length - 1) / (maxLabels - 1));
      ctx.fillStyle  = "#64748b";
      ctx.font       = "10px system-ui";
      ctx.textAlign  = "center";
      for (let i = 0; i < rounds.length; i += step) {
        const label = rounds[i].date.slice(5); // MM-DD
        ctx.fillText(label, pts[i].x, H - pad.bottom + 18);
      }
      // Always label last point
      if ((rounds.length - 1) % step !== 0) {
        const last = rounds.length - 1;
        ctx.fillText(rounds[last].date.slice(5), pts[last].x, H - pad.bottom + 18);
      }
    }

    // Redraw chart on resize
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (document.getElementById("results").style.display !== "none") {
          // re-fetch stored rounds from DOM isn't possible; rely on user reloading
        }
      }, 200);
    });
  </script>
</body>
</html>
