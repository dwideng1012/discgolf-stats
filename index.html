<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discgolf Stats – Kristjan Liiv</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #60a5fa;
      --accent: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 16px 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    header { margin-bottom: 28px; }
    h1 { font-size: 1.6rem; color: var(--accent); letter-spacing: -0.02em; }
    .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 20px;
    }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    input[type="text"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      width: 300px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 13px;
      border-radius: 7px;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }
    button#loadBtn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 24px;
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button#loadBtn:hover:not(:disabled) { opacity: 0.88; }
    button#loadBtn:active:not(:disabled) { transform: scale(0.97); }
    button#loadBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Progress */
    #progressWrap { margin-bottom: 20px; display: none; }
    #progressLabel { font-size: 0.78rem; color: var(--muted); margin-bottom: 7px; }
    .progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #progressFill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.25s ease;
    }

    #errorMsg { color: var(--red); font-size: 0.875rem; margin-bottom: 16px; min-height: 1.2em; }

    /* Stats grid */
    #statsGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
    }
    .card-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .card-value {
      font-family: 'Courier New', monospace;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .good  { color: var(--green); }
    .bad   { color: var(--red); }
    .neutral { color: var(--blue); }

    /* Chart */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 18px 14px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 14px;
    }
    #trendChart { display: block; width: 100%; }

    /* Table */
    .table-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .table-section h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 16px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      padding: 9px 14px;
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.018); }
    td.mono { font-family: 'Courier New', monospace; }
    td.good { color: var(--green); }
    td.bad  { color: var(--red); }
    td.zero { color: var(--muted); }
    td.course { color: var(--muted); font-size: 0.8rem; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #results { display: none; }

    #version {
      position: fixed;
      bottom: 10px;
      right: 14px;
      font-size: 0.7rem;
      color: var(--border);
      font-family: 'Courier New', monospace;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      input[type="text"] { width: 100%; }
      .controls { flex-direction: column; align-items: stretch; }
      button#loadBtn { width: 100%; }
      .card-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Discgolf Stats</h1>
    <p class="subtitle">Discgolf Metrix</p>
  </header>

  <div class="controls">
    <div class="field">
      <label>API Kood</label>
      <input type="text" id="apiCode" value="oI4goD8pdKO1N2vEJ3RWpGjddYiikDhI" autocomplete="off" spellcheck="false">
    </div>
    <div class="field">
      <label>Voore</label>
      <select id="countSelect">
        <option value="10">10</option>
        <option value="25">25</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
      </select>
    </div>
    <button id="loadBtn" onclick="loadData()">Laadi</button>
  </div>

  <div id="progressWrap">
    <div id="progressLabel">Laadimine...</div>
    <div class="progress-track"><div id="progressFill"></div></div>
  </div>

  <div id="errorMsg"></div>

  <div id="results">
    <div id="statsGrid"></div>

    <div class="section">
      <h2>Skoor trend &mdash; Diff vs par</h2>
      <canvas id="trendChart"></canvas>
    </div>

    <div class="table-section">
      <h2>Viimased voorud</h2>
      <table>
        <thead>
          <tr>
            <th>Kuup&auml;ev</th>
            <th>Rada</th>
            <th>Skoor</th>
            <th>Diff</th>
            <th>Koht</th>
          </tr>
        </thead>
        <tbody id="roundsBody"></tbody>
      </table>
    </div>
  </div>

  <div id="version"></div>

  <script>
    const PLAYER_ID = "2821";
    document.getElementById("version").textContent =
      "v1.6 \u00b7 " + new Date().toISOString().slice(0, 10);
    const API = "https://discgolfmetrix.com/api.php";

    function setProgress(pct, label) {
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("progressLabel").textContent = label;
    }

    function showError(msg) {
      document.getElementById("errorMsg").textContent = msg;
    }

    async function testFetch() {
      const url = 'https://discgolfmetrix.com/api.php?content=result&id=3571727&code=oI4goD8pdKO1N2vEJ3RWpGjddYiikDhI';
      const response = await fetch(url);
      const text = await response.text();
      console.log("RAW RESPONSE:", text.slice(0, 1000));
      const data = JSON.parse(text);
      console.log("data keys:", Object.keys(data));
      console.log("data.Results type:", typeof data.Results, Array.isArray(data.Results));
      console.log("data.Results length:", data.Results?.length);
      console.log("first result UserID:", data.Results?.[0]?.UserID);
    }
    testFetch();

    async function fetchJSON(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    async function loadData() {
      const code = document.getElementById("apiCode").value.trim();
      const count = parseInt(document.getElementById("countSelect").value, 10);

      showError("");
      document.getElementById("results").style.display = "none";
      document.getElementById("progressWrap").style.display = "block";
      document.getElementById("loadBtn").disabled = true;

      try {
        setProgress(5, "Laen võistluste nimekirja...");
        console.log("fetching competitions...");
        const list = await fetchJSON(API + "?content=my_competitions&code=" + encodeURIComponent(code));

        if (list.Errors && list.Errors.length) throw new Error(list.Errors.join(", "));

        const allIds = list.my_competitions || [];
        console.log("competitions loaded:", allIds.length);
        if (!allIds.length) throw new Error("Võistluste nimekiri on tühi.");

        // Take last N (newest first after reverse)
        const toFetch = allIds.slice(-count).reverse();

        const BATCH = 5;
        const rounds = [];

        for (let i = 0; i < toFetch.length; i += BATCH) {
          const batch = toFetch.slice(i, i + BATCH);

          const results = await Promise.all(
            batch.map(id => {
              console.log("fetching result:", id);
              return fetchJSON(API + "?content=result&id=" + id + "&code=" + encodeURIComponent(code))
                .catch(e => { console.error("failed result", id, e); return null; });
            })
          );

          for (const data of results) {
            const id = data && data.Competition ? data.Competition.ID : "?";
            if (!data || !data.Competition) continue;
            console.log("id:", id, "errors:", data.Errors, "competition:", data.Competition?.Date);

            // Results is a top-level key, not inside Competition
            if (!data.Results || !data.Results.length) {
              console.log("id:", id, "no Results array, skipping");
              continue;
            }

            // Condition 1: player found
            const player = data.Results.find(r => r.UserID === PLAYER_ID);
            if (!player) {
              console.log("id:", id, "player 2821 not found in", data.Results.length, "results");
              continue;
            }

            // Condition 3: DNF === null (not "1" or any other truthy value)
            if (player.DNF !== null && player.DNF !== undefined) {
              console.log("id:", id, "DNF, skipping");
              continue;
            }

            // Condition 2: Sum > 0
            if (!(Number(player.Sum) > 0)) {
              console.log("id:", id, "Sum=0, skipping");
              continue;
            }

            // Condition 4: PlayerResults has at least one hole object.
            // Some rounds have mixed format: [[], {Result:"4",...}, []]
            // Only skip if ALL elements are empty arrays — never filter on a single empty element.
            const pr = player.PlayerResults || [];
            const validHoles = pr.filter(h => h !== null && !Array.isArray(h) && typeof h === "object");
            if (validHoles.length === 0) {
              console.log("id:", id, "no valid hole data, skipping");
              continue;
            }
            console.log("id:", id, "VALID round, diff:", player.Diff);

            // Compute per-hole stats from PlayerResults (fields are strings "0"/"1")
            const totalHoles = validHoles.length;
            const bue = validHoles.filter(h => h.BUE === "1").length;
            const grh = validHoles.filter(h => h.GRH === "1").length;
            const icp = validHoles.filter(h => h.ICP === "1").length;

            rounds.push({
              date:   data.Competition.Date || "",
              name:   data.Competition.Name || "",
              course: data.Competition.CourseName || data.Competition.Name || "",
              sum:    Number(player.Sum),
              diff:   Number(player.Diff),
              place:  player.Place,
              holes:  totalHoles,
              bue,
              grh,
              icp,
            });
          }

          const done = Math.min(i + BATCH, toFetch.length);
          const pct = 10 + Math.round((done / toFetch.length) * 86);
          setProgress(pct, "Laetud " + done + " / " + toFetch.length + " võistlust...");
        }

        setProgress(100, "Valmis!");

        if (rounds.length === 0) {
          showError("Kehtivaid voore ei leitud.");
        } else {
          displayResults(rounds);
        }
      } catch (e) {
        console.error("loadData error:", e);
        showError("Viga: " + e.message);
      } finally {
        setTimeout(() => {
          document.getElementById("progressWrap").style.display = "none";
        }, 400);
        document.getElementById("loadBtn").disabled = false;
      }
    }

    function diffClass(v) {
      if (v < 0) return "good";
      if (v > 0) return "bad";
      return "neutral";
    }

    function fmtDiff(v, decimals) {
      const n = decimals !== undefined
        ? parseFloat(v.toFixed(decimals))
        : Math.round(v);
      if (n === 0) return "E";
      return (n > 0 ? "+" : "") + (decimals !== undefined ? v.toFixed(decimals) : n);
    }

    function displayResults(rounds) {
      // Chronological for chart/averages, newest-first for table
      const chrono = [...rounds].sort((a, b) => a.date.localeCompare(b.date));
      const diffs = chrono.map(r => r.diff);

      const best  = Math.min(...diffs);
      const worst = Math.max(...diffs);
      const avg   = diffs.reduce((s, d) => s + d, 0) / diffs.length;
      const last10diffs = diffs.slice(-10);
      const avg10 = last10diffs.reduce((s, d) => s + d, 0) / last10diffs.length;

      // Stats cards
      const grid = document.getElementById("statsGrid");
      const cards = [
        { label: "Voore kokku",      value: rounds.length,     cls: "neutral", raw: null },
        { label: "Parim voor",       value: fmtDiff(best),     cls: diffClass(best) },
        { label: "Halvim voor",      value: fmtDiff(worst),    cls: diffClass(worst) },
        { label: "Keskmine diff",    value: fmtDiff(avg, 1),   cls: diffClass(avg) },
        { label: "Viimane 10 (avg)", value: fmtDiff(avg10, 1), cls: diffClass(avg10) },
      ];
      grid.innerHTML = cards.map(c => `
        <div class="card">
          <div class="card-label">${c.label}</div>
          <div class="card-value ${c.cls}">${c.value}</div>
        </div>
      `).join("");

      drawChart(chrono);

      // Table: newest first
      const tbody = document.getElementById("roundsBody");
      tbody.innerHTML = chrono.slice().reverse().map(r => {
        const dc = diffClass(r.diff);
        return `<tr>
          <td>${r.date}</td>
          <td class="course">${r.course}</td>
          <td class="mono">${r.sum}</td>
          <td class="mono ${dc}">${fmtDiff(r.diff)}</td>
          <td class="mono">${r.place != null ? r.place : "–"}</td>
        </tr>`;
      }).join("");

      document.getElementById("results").style.display = "block";
    }

    function drawChart(rounds) {
      const canvas = document.getElementById("trendChart");
      const dpr = window.devicePixelRatio || 1;
      const W = canvas.parentElement.clientWidth;
      const H = 220;
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width  = W + "px";
      canvas.style.height = H + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      if (rounds.length < 2) {
        ctx.fillStyle = "#64748b";
        ctx.font = "13px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("Liiga vähe andmeid graafiku jaoks.", W / 2, H / 2);
        return;
      }

      const diffs  = rounds.map(r => r.diff);
      const minD   = Math.min(...diffs);
      const maxD   = Math.max(...diffs);
      const range  = maxD - minD || 1;
      const pad    = { top: 14, right: 14, bottom: 38, left: 42 };
      const cw     = W - pad.left - pad.right;
      const ch     = H - pad.top  - pad.bottom;

      // Horizontal grid lines
      const ySteps = 4;
      for (let i = 0; i <= ySteps; i++) {
        const y   = pad.top + (ch / ySteps) * i;
        const val = maxD - ((maxD - minD) / ySteps) * i;

        ctx.strokeStyle = "#2a2d3e";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(pad.left + cw, y);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "10px 'Courier New', monospace";
        ctx.textAlign = "right";
        ctx.fillText(fmtDiff(val, 0), pad.left - 6, y + 4);
      }

      // Zero line
      if (minD < 0 && maxD > 0) {
        const zy = pad.top + ch * (maxD / range);
        ctx.strokeStyle = "#3b82f6";
        ctx.lineWidth   = 1;
        ctx.setLineDash([4, 5]);
        ctx.beginPath();
        ctx.moveTo(pad.left, zy);
        ctx.lineTo(pad.left + cw, zy);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Data points
      const pts = rounds.map((r, i) => ({
        x: pad.left + (i / (rounds.length - 1)) * cw,
        y: pad.top  + ch * (1 - (r.diff - minD) / range),
        date: r.date,
      }));

      // Fill gradient
      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      grad.addColorStop(0,   "rgba(16,185,129,0.28)");
      grad.addColorStop(1,   "rgba(16,185,129,0)");

      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.lineTo(pts[pts.length - 1].x, pad.top + ch);
      ctx.lineTo(pts[0].x, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Line
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = "#10b981";
      ctx.lineWidth   = 2;
      ctx.lineJoin    = "round";
      ctx.stroke();

      // Dots
      for (const p of pts) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
        ctx.fillStyle   = "#10b981";
        ctx.strokeStyle = "#0f1117";
        ctx.lineWidth   = 1.5;
        ctx.fill();
        ctx.stroke();
      }

      // X-axis date labels (at most 8)
      const maxLabels = Math.min(rounds.length, 8);
      const step = Math.ceil((rounds.length - 1) / (maxLabels - 1));
      ctx.fillStyle  = "#64748b";
      ctx.font       = "10px system-ui";
      ctx.textAlign  = "center";
      for (let i = 0; i < rounds.length; i += step) {
        const label = rounds[i].date.slice(5); // MM-DD
        ctx.fillText(label, pts[i].x, H - pad.bottom + 18);
      }
      // Always label last point
      if ((rounds.length - 1) % step !== 0) {
        const last = rounds.length - 1;
        ctx.fillText(rounds[last].date.slice(5), pts[last].x, H - pad.bottom + 18);
      }
    }

    // Redraw chart on resize
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (document.getElementById("results").style.display !== "none") {
          // re-fetch stored rounds from DOM isn't possible; rely on user reloading
        }
      }, 200);
    });
  </script>
</body>
</html>
